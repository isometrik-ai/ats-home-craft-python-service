services:
  apps:
    image: appscrip007/legalai-fast-api:development      # 👈 tells Compose how to tag the built image
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: legalai-service
    restart: unless-stopped
    env_file:
      - .env
      # Python configuration
      # - PYTHONPATH=/app
      # - PYTHONUNBUFFERED=1
      # - PYTHONDONTWRITEBYTECODE=1

      # Database configuration (from Bitbucket secrets)
      # - DB_HOST=${DB_HOST}
      # - DB_PORT=${DB_PORT}
      # - DB_DATABASE=${DB_DATABASE}
      # - DB_USER=${DB_USER}
      # - DB_PASSWORD=${DB_PASSWORD}

      # Supabase configuration (from Bitbucket secrets)
      # - SUPABASE_URL=${SUPABASE_URL}
      # - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}

      # JWT configuration (from Bitbucket secrets)
      # - JWT_SECRET=${JWT_SECRET}

      # OpenAI configuration (from Bitbucket secrets)
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Datadog configuration (from Bitbucket secrets)
      # - DD_ENV=${DD_ENV:-production}
      # - DD_SERVICE=${DD_SERVICE:-legalai-service-python}
      # - DD_VERSION=${DD_VERSION:-1.0.0}

      # Application configuration
      # - ENVIRONMENT=${ENVIRONMENT:-production}
      # - LOG_LEVEL=${LOG_LEVEL:-INFO}

    ports:
      - '5001:5000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'app=legalai-service-python'
        env: 'production'
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
