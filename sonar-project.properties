sonar.projectKey=isometrik-ai_house-of-apps-legal-ai-fast-api
sonar.organization=isometrik-ai

# Include all source directories managed by pants
sonar.sources=apps,libs
sonar.tests=apps/user_service/tests

# Exclude test files, cache files, and migrations from analysis
sonar.exclusions=**/tests/**,**/__pycache__/**,**/*.pyc,**/migrations/**,**/.pants.*/**,.pants.d/**,**/user_service/app/main.py

# Coverage report paths (generated by pants)
sonar.python.coverage.reportPaths=coverage.xml
